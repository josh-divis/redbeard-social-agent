<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · {{ brand_name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <div class="login-wrap wrap">
    <div class="login-card">
      <div class="brand" style="color: var(--charcoal); margin-bottom: 1rem;">
        <div class="brand-mark">RB</div>
        <div>
          {{ brand_name }}
          <span class="sub" style="color: var(--muted);">Dashboard login</span>
        </div>
      </div>
      <h1>Review access</h1>
      <p class="lead">Local review queue for social drafts. Not connected to public social APIs.</p>
      <form method="post">
        <label for="password">Password</label>
        <input id="password" type="password" name="password" autocomplete="current-password" required autofocus>
        {% if error %}
          <p class="error-text">{{ error }}</p>
        {% endif %}
        <button class="btn btn-primary" type="submit">Sign in</button>
      </form>
    </div>
  </div>
</body>
</html>

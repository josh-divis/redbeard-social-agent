# =============================================================================
# RedBeard Social Agent — Main Configuration
# Environment variables in .env override secrets; this file holds behavior.
# =============================================================================

brand:
  name: "RedBeard Risk"
  short_name: "RedBeard"
  voice_name: "The Beard"
  website: "https://redbeardrisk.com"
  email: "hello@redbeardrisk.com"
  phone: "(602) 544-3947"
  location: "Mesa / East Valley, Arizona"
  founder: "Josh"
  tagline: "On-call IT & cybersecurity for Arizona trades"

# Industries we speak to (rotates into prompts)
industries:
  - HVAC
  - Plumbing
  - Electrical
  - Construction
  - Field service / general contractors

# Service offerings to weave in naturally (not hard-sell every post)
services:
  - name: "Cyber Risk Snapshot"
    description: "60–90 minute plain-English cyber risk assessment for trade shops"
  - name: "RedBeard Care"
    description: "Month-to-month on-call IT support for Arizona trades — no long contracts"

# Content pillars (weights control batch mix; must sum roughly to 1.0)
pillars:
  problem_solution:
    weight: 0.30
    label: "Problem → Solution"
    description: "A real trade-shop pain point and a practical fix"
  educational:
    weight: 0.30
    label: "Educational / How-To"
    description: "Actionable tips owners and office managers can use today"
  local_bts:
    weight: 0.20
    label: "Local / Behind the Scenes"
    description: "Arizona life, East Valley shops, day-in-the-life credibility"
  opinion:
    weight: 0.20
    label: "Opinion / Contrarian"
    description: "Bold but fair takes on IT, insurance, MSPs, and 'set it and forget it'"

# Platforms and character guidance
platforms:
  linkedin:
    enabled: true
    max_chars: 2800
    style: "professional but plain-spoken; short paragraphs; 1–3 hashtags max"
  facebook:
    enabled: true
    max_chars: 2000
    style: "conversational; can be a bit warmer; light emoji OK (0–2)"
  instagram:
    enabled: true
    max_chars: 2200
    style: "punchy hook first; line breaks; 5–12 hashtags at end; CTA soft"

# Batch generation defaults (semi-automatic twice per week)
generation:
  posts_per_batch: 12          # total posts across platforms/pillars
  variants_per_idea: 1         # platform-specific rewrite of each idea
  temperature: 0.75
  max_tokens: 900
  # Days cron should fire generation (cron itself is the source of truth)
  schedule_days:
    - monday
    - thursday
  schedule_time_local: "08:00" # America/Phoenix recommended on the Pi
  timezone: "America/Phoenix"

# Safety rails — v1 never auto-posts
safety:
  require_human_approval: true
  auto_post_enabled: false
  # Approved posts can be exported as copy-paste packs or JSON for manual publish
  export_on_approve: true

# Logging
logging:
  level: INFO
  file: "logs/agent.log"
  max_bytes: 5242880   # 5 MB
  backup_count: 5

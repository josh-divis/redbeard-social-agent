# =============================================================================
# RedBeard Social Agent — Main Configuration
# Environment variables in .env override secrets; this file holds behavior.
# =============================================================================

brand:
  name: "RedBeard Risk"
  short_name: "RedBeard"
  voice_name: "The Beard"
  website: "https://redbeardrisk.com"
  email: "hello@redbeardrisk.com"
  phone: "(602) 544-3947"
  location: "Mesa / East Valley, Arizona"
  founder: "Josh"
  tagline: "Your on-call IT guy for Arizona trades"
  personality: "practical tradesman, straightforward, no jargon, slightly bold when calling out nonsense, helpful dad vibe, East Valley local"
  key_phrases:
    - "keeps your trucks rolling"
    - "makes insurance renewals boring"
    - "same guy who answers the phone"
    - "plain English"
    - "shops like yours"
    - "I actually show up"

# Industries we speak to (rotates into prompts)
industries:
  - HVAC
  - Plumbing
  - Electrical
  - Construction
  - Field service / general contractors

# Service offerings to weave in naturally
services:
  - name: "Cyber Risk Snapshot"
    description: "60–90 minute plain-English cyber risk assessment for trade shops"
  - name: "RedBeard Care"
    description: "Month-to-month on-call IT support for Arizona trades — no long contracts"

# Content pillars (weights control batch mix; must sum roughly to 1.0)
pillars:
  problem_solution:
    weight: 0.35
    label: "Problem → Solution"
    description: "A real trade-shop pain point and a practical fix"
  educational:
    weight: 0.25
    label: "Educational / How-To"
    description: "Actionable tips owners and office managers can use today"
  local_bts:
    weight: 0.25
    label: "Local / Behind the Scenes"
    description: "Arizona life, East Valley shops, day-in-the-life credibility"
  opinion:
    weight: 0.15
    label: "Opinion / Contrarian"
    description: "Bold but fair takes on IT, insurance, MSPs, and 'set it and forget it' security"

# Platforms and character guidance
platforms:
  linkedin:
    enabled: true
    max_chars: 2800
    style: "professional but plain-spoken; short paragraphs; practical; uses trade analogies; ends with a soft question"
  facebook:
    enabled: true
    max_chars: 2000
    style: "conversational; warmer and local; light emoji OK (0–2); can be a bit bolder"
  instagram:
    enabled: true
    max_chars: 2200
    style: "punchy hook first; short lines; relatable; 6–10 hashtags at end; CTA soft"

# Batch generation defaults
generation:
  posts_per_batch: 10          # Easier to review in batches
  variants_per_idea: 1
  temperature: 0.78
  max_tokens: 850
  schedule_days:
    - monday
    - thursday
  schedule_time_local: "08:00"
  timezone: "America/Phoenix"

# Safety rails — v1 never auto-posts
safety:
  require_human_approval: true
  auto_post_enabled: false
  export_on_approve: true

# Logging
logging:
  level: INFO
  file: "logs/agent.log"
  max_bytes: 5242880
  backup_count: 5
